        const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const generateKeyboard = (word) => {
            let letters = word.replace(/\s/g, '').split('');
            let pool = [...letters];
            while (pool.length < 14) { pool.push(ALPHABET[Math.floor(Math.random() * 26)]); }
            return pool.sort(() => Math.random() - 0.5).map((c, i) => ({ id: i, char: c, isUsed: false }));
        };

                        <p className="text-zinc-300 text-center mb-8 font-medium leading-relaxed">{message}</p>
                        <div className="flex w-full gap-4">
                            {showCancel && <button onClick={onCancel} className="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold text-zinc-400">HỦY</button>}
                            <button onClick={onConfirm} className="flex-1 py-4 bg-gold rounded-2xl font-black text-black">ĐỒNG Ý</button>

        function App() {

            const [nickname, setNickname] = useState('');
            const [screen, setScreen] = useState('home');
            
            const [levelData, setLevelData] = useState(null);
            const [slots, setSlots] = useState([]);
            const [keyboard, setKeyboard] = useState([]);
            const [hintLevel, setHintLevel] = useState(0); // 0: Tag, 1: Question, 2: Phao
            const [isWrong, setIsWrong] = useState(false);
            const [isVictory, setIsVictory] = useState(false);

            const [alert, setAlert] = useState({ open: false, t: '', m: '', cancel: false, fn: null });

            useEffect(() => {
                const n = localStorage.getItem('dc_name');
                const c = localStorage.getItem('dc_coins');
                const l = localStorage.getItem('dc_lv');
                if (n) { setNickname(n); if(c) setCoins(parseInt(c)); if(l) setLevelId(parseInt(l)); }
            }, []);

            const handleLogin = (name) => {
                if(!name) return;
                setNickname(name.toUpperCase());
                localStorage.setItem('dc_name', name.toUpperCase());
                setScreen('play');
                initLevel(levelId);
            };

            const initLevel = (id) => {
                const data = OFFLINE_DB.find(x => x.id === id) || OFFLINE_DB[0];
                setLevelData(data);
                const s = [];
                for(let c of data.answer) { s.push(c === ' ' ? { type: 'space' } : { type: 'slot', char: null, ref: null }); }
                setSlots(s);
                setKeyboard(generateKeyboard(data.answer));
                setHintLevel(0); setIsWrong(false); setIsVictory(false);
            };

            const handlePress = (item) => {
                if (item.isUsed || isVictory) return;
                playSound('click'); setIsWrong(false);
                const idx = slots.findIndex(s => s.type === 'slot' && s.char === null);
                if (idx !== -1) {
                    const newSlots = [...slots];
                    newSlots[idx] = { ...newSlots[idx], char: item.char, ref: item.id };
                    setSlots(newSlots);
                    setKeyboard(keyboard.map(k => k.id === item.id ? { ...k, isUsed: true } : k));
                }
            };

            const handleRemove = (idx) => {
                if (slots[idx].char === null || isVictory) return;
                playSound('click'); setIsWrong(false);
                const refId = slots[idx].ref;
                const newSlots = [...slots];
                newSlots[idx] = { ...newSlots[idx], char: null, ref: null };
                setSlots(newSlots);
                setKeyboard(keyboard.map(k => k.id === refId ? { ...k, isUsed: false } : k));
            };

            useEffect(() => {
                if (slots.length > 0 && !slots.some(s => s.type === 'slot' && s.char === null)) {
                    const res = slots.map(s => s.type === 'space' ? ' ' : s.char).join('');
                    if (res === levelData.answer) {
                        playSound('win'); setTimeout(() => setIsVictory(true), 300);
                        const nc = coins + 300; setCoins(nc);
                        localStorage.setItem('dc_coins', nc);
                        localStorage.setItem('dc_lv', levelId + 1);
                    } else {
                        playSound('wrong'); setIsWrong(true);
                    }
                }
            }, [slots]);

            const next = () => { setLevelId(levelId + 1); initLevel(levelId + 1); };

            return (
                <div className="max-w-md mx-auto h-full flex flex-col relative overflow-hidden bg-zinc-950">
                    <CustomAlert isOpen={alert.open} title={alert.t} message={alert.m} showCancel={alert.cancel} onConfirm={() => { alert.fn?.(); setAlert({...alert, open: false}); }} onCancel={() => setAlert({...alert, open: false})} />

                    {screen === 'home' ? (
                        <div className="flex-1 flex flex-col justify-center items-center p-8 text-center animate-fade">
                            <div className="w-24 h-24 mb-6 shine-effect rounded-3xl p-1 bg-gold shadow-lg"><img src="./images/logo.png" className="w-full h-full object-cover rounded-[20px]" /></div>
                            <h1 className="text-[28px] font-black text-gold tracking-widest uppercase mb-[-5px]">Đẳng Cấp</h1>
                            <h2 className="text-[52px] font-black text-white tracking-tighter" style={{fontFamily: "'Playfair Display', serif"}}>Bắt Chữ <span className="text-3xl text-gold">3D</span></h2>
                            <div className="glass-panel p-8 rounded-[40px] w-full mt-10">
                                <input type="text" placeholder="BIỆT DANH..." className="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl p-4 text-center font-bold text-white mb-6 outline-none focus:border-amber-500 uppercase" onKeyDown={(e) => e.key === 'Enter' && handleLogin(e.target.value)} />
                                <button onClick={() => handleLogin(document.querySelector('input').value)} className="w-full py-5 bg-gold rounded-full font-black text-black text-xl shine-effect">VÀO GAME ➔</button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 flex flex-col">
                            {/* HEADER - NÂNG LÊN CAO */}
                            <div className="p-6 pt-10 text-center glass-panel border-b-0 rounded-b-[40px]">
                                <span className="text-amber-500 text-xs font-black tracking-[0.3em]"># {levelData?.topic}</span>
                                <h3 className="text-white text-4xl font-black mt-1">LEVEL {levelId}</h3>
                                
                                <div className="mt-4 min-h-[60px] flex items-center justify-center bg-black/40 rounded-3xl p-4 border border-zinc-800">
                                    {hintLevel >= 1 ? <p className="text-[15px] font-semibold animate-fade">{levelData.question}</p> : <button onClick={() => setAlert({open: true, t: 'MỞ CÂU HỎI', m: 'Dùng 100 Xu để hiện câu hỏi?', cancel: true, fn: () => { setCoins(c => c-100); setHintLevel(1); }})} className="px-6 py-2 bg-zinc-800 rounded-full text-zinc-500 font-bold text-sm">Mở Câu hỏi (-100 Xu)</button>}
                                </div>
                                {hintLevel === 2 && <p className="text-amber-500 text-xs font-bold mt-2 animate-bounce uppercase tracking-widest">💡 Phao: {levelData.p || "Nhìn kỹ hình đi!"}</p>}
                            </div>

                            {/* CENTER - ẢNH VÀ Ô CHỮ CÂN ĐỐI */}
                            <div className="flex-1 flex flex-col items-center justify-center p-6 gap-8">
                                <div className="w-full aspect-square rounded-[40px] overflow-hidden border-4 border-zinc-800 shadow-2xl bg-black relative">
                                    <img src={`./images/level${levelId}.jpg`} className="w-full h-full object-cover" />
                                </div>

                                <div className={`w-full flex flex-wrap justify-center gap-2 ${isWrong ? 'animate-shake' : ''}`}>
                                    {slots.map((s, i) => (
                                        s.type === 'space' ? <div key={i} className="w-full h-2"></div> :
                                        <button key={i} onClick={() => handleRemove(i)} className={`w-12 h-14 rounded-xl flex items-center justify-center font-black text-2xl transition-all ${s.char ? 'slot-filled' : 'slot-waiting'}`}>{s.char}</button>
                                    ))}
                                </div>
                            </div>

                            {/* BOTTOM - BÀN PHÍM VÀ VÍ VÀNG */}
                            <div className="glass-panel p-6 pb-10 rounded-t-[50px] border-t-2">
                                <div className="flex justify-between items-center mb-6">
                                    <button onClick={() => setAlert({open: true, t: 'TRỢ GIÚP', m: 'Dùng 150 Xu để nhận phao cứu sinh?', cancel: true, fn: () => { setCoins(c => c-150); setHintLevel(2); }})} className="px-6 py-3 bg-zinc-800 rounded-full text-zinc-400 font-black text-xs border border-zinc-700 active:scale-95 transition-all">DÙNG PHAO CỨU SINH</button>
                                    <div className="flex items-center gap-2 bg-black/40 px-4 py-2 rounded-2xl border border-zinc-800">
                                        <span className="text-amber-400 font-black text-xl">{coins}</span><span className="text-xl">🪙</span>
                                    </div>
                                </div>

                                <div className="flex flex-wrap justify-center gap-3">
                                    {keyboard.map(k => (
                                        <button key={k.id} onClick={() => handlePress(k)} className={`w-[calc(100%/7-12px)] aspect-square rounded-2xl font-black text-xl transition-all ${k.isUsed ? 'opacity-0 scale-50' : 'bg-zinc-800 border-b-4 border-black text-white active:translate-y-1'}`}>{k.char}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {isVictory && (
                        <div className="absolute inset-0 z-[110] bg-black/95 flex items-center justify-center p-8 animate-fade">
                            <div className="glass-panel w-full p-10 rounded-[50px] flex flex-col items-center border-4 border-gold shadow-[0_0_50px_rgba(218,165,32,0.3)] relative overflow-hidden">
                                <div className="absolute top-[-50px] w-full h-40 bg-gold opacity-10 blur-[60px]"></div>
                                <h4 className="text-zinc-500 font-black tracking-widest text-sm mb-2 uppercase italic">Đáp án đẳng cấp</h4>
                                <h2 className="text-gold text-5xl font-black mb-12 tracking-widest text-center">{levelData?.answer}</h2>
                                <button onClick={next} className="w-full py-6 bg-gold rounded-full font-black text-black text-2xl shine-effect active:scale-95 transition-all">TIẾP THEO ➔</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
