        .shine-effect { position: relative; overflow: hidden; }
        .shine-effect::after { content: ''; position: absolute; top: -50%; left: -50%; width: 50px; height: 200%; background: rgba(255, 255, 255, 0.3); transform: rotate(45deg); animation: shine 4s infinite; }

            { id: 89, topic: "Y HỌC", question: "Bệnh tâm lý trầm uất?", answer: "TRAM CAM", hint: "Khúc gỗ trầm hương chìm xuống biển." },
            { id: 90, topic: "TỪ LÓNG", question: "Khen hành động dũng cảm?", answer: "HAO HAN", hint: "Tên một vị anh hùng lương sơn." },
            { id: 91, topic: "TỪ LÓNG", question: "Vị trí tồi tệ phân tầng?", answer: "DAY XA HOI", hint: "Nơi bẩn nhất của xã hội." },
            { id: 92, topic: "KIẾN TRÚC", question: "Nơi hoàn toàn khuất sáng?", answer: "BONG TOI", hint: "Nơi ánh sáng không chiếu tới." },
            { id: 93, topic: "TRIẾT HỌC", question: "Sự thật luôn đúng?", answer: "CHAN LY", hint: "Chân lý chiếu sáng mười phương." },
            { id: 94, topic: "TỪ LÓNG", question: "Người thức xuyên đêm?", answer: "CU DEM", hint: "Loài chim có đôi mắt to hay kêu ban đêm." },
            { id: 95, topic: "TỪ LÓNG", question: "Hot trend phát ngôn vô tri?", answer: "XA LER", hint: "Xà lơ." },
            { id: 96, topic: "TỪ LÓNG", question: "Hành động làm quá lố?", answer: "O DE", hint: "Ô dề." },
            { id: 97, topic: "TỪ LÓNG", question: "Khen món ăn ngon?", answer: "MLEM", hint: "Tiếng liếm mép vì thèm ăn." },
            { id: 98, topic: "TỪ LÓNG", question: "Hành động phá phách?", answer: "BAO DOI", hint: "Báo đời báo hại." },
            { id: 99, topic: "QUANG HỌC", question: "Tia sáng dội ngược lại?", answer: "PHAN QUANG", hint: "Hiện tượng phản xạ ánh sáng." },
            { id: 100, topic: "CẢNH GIỚI", question: "Chất lượng đồ họa game?", answer: "DANG CAP", hint: "Từ thể hiện sự tuyệt vời, VIP nhất." }
        ];

        const VIETNAMESE_ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        const generateKeyboard = (word) => {
            if (!word) return [];
            let letters = word.replace(/\s/g, '').split(''); 
            let targetLength = Math.max(14, Math.ceil(letters.length / 7) * 7);
            let keyboardLetters = [...letters];
            while (keyboardLetters.length < targetLength) { 
                keyboardLetters.push(VIETNAMESE_ALPHABET[Math.floor(Math.random() * VIETNAMESE_ALPHABET.length)]); 
            }
            return keyboardLetters.sort(() => Math.random() - 0.5).map((char, index) => ({ id: index, char: char, isUsed: false }));
        };

        const CustomAlert = ({ isOpen, title, message, type = 'warning', onConfirm, onCancel, showCancel = false }) => {
            if (!isOpen) return null;
            const isWarning = type === 'warning';
            const borderColor = isWarning ? 'border-amber-500' : 'border-red-500';
            const icon = isWarning ? '💡' : '🚨';
            const titleColor = isWarning ? 'text-amber-500' : 'text-red-500';

            return (
                <div className="absolute inset-0 z-[9999] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md animate-fade">
                    <div className={`glass-panel w-full max-w-sm p-8 rounded-[32px] flex flex-col items-center border-t-4 ${borderColor} shadow-2xl scale-100`}>
                        <div className="text-5xl mb-4 drop-shadow-xl">{icon}</div>
                        <h2 className={`text-xl font-black mb-3 text-center uppercase tracking-widest ${titleColor}`}>{title}</h2>
                        <p className="text-zinc-300 text-center mb-8 leading-relaxed font-medium">{message}</p>
                        
                        <div className="flex w-full gap-4">
                            {showCancel && (
                                <button onClick={onCancel} className="flex-1 py-4 bg-zinc-800 rounded-2xl text-zinc-400 font-bold active:scale-95 transition-transform border border-zinc-700">
                                    HỦY BỎ
                                </button>
                            )}
                            <button onClick={onConfirm} className={`flex-1 py-4 rounded-2xl font-black text-black active:scale-95 transition-transform ${isWarning ? 'bg-gold shadow-gold' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)]'}`}>
                                ĐỒNG Ý
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentScreen, setCurrentScreen] = useState('home');
            const [nickname, setNickname] = useState('');
            const [inputName, setInputName] = useState('');
            const [coins, setCoins] = useState(1500);
            const [currentLevelId, setCurrentLevelId] = useState(1);
            
            const [levelData, setLevelData] = useState(null);
            
            const [answerSlots, setAnswerSlots] = useState([]); 
            const [availableLetters, setAvailableLetters] = useState([]);
            
            const [isVictory, setIsVictory] = useState(false);
            const [isWrong, setIsWrong] = useState(false); 
            const [hintStage, setHintStage] = useState(0); 

            const [alertState, setAlertState] = useState({ isOpen: false, title: '', message: '', type: 'warning', showCancel: false, onConfirm: null });
            const showAlert = (title, message, type = 'warning') => { playSound('wrong'); setAlertState({ isOpen: true, title, message, type, showCancel: false, onConfirm: closeAlert }); };
            const showConfirm = (title, message, onConfirmAction) => { playSound('click'); setAlertState({ isOpen: true, title, message, type: 'warning', showCancel: true, onConfirm: () => { closeAlert(); onConfirmAction(); } }); };
            const closeAlert = () => setAlertState({ ...alertState, isOpen: false });

            useEffect(() => {
                const savedName = localStorage.getItem('dc_nickname');
                const savedCoins = localStorage.getItem('dc_coins');
                const savedLevel = localStorage.getItem('dc_level');
                if (savedName) {
                    setNickname(savedName);
                    if (savedCoins) setCoins(parseInt(savedCoins));
                    if (savedLevel) setCurrentLevelId(parseInt(savedLevel));
                }
            }, []);

            const handleLogin = () => {
                if (!nickname && inputName.trim() === '') { showAlert("THIẾU THÔNG TIN", "Đẳng cấp cần một cái tên. Hãy nhập Biệt danh để tiếp tục!", "error"); return; }
                if (!nickname) {
                    const cleanName = inputName.trim().toUpperCase();
                    setNickname(cleanName);
                    localStorage.setItem('dc_nickname', cleanName);
                    localStorage.setItem('dc_coins', '1500');
                    localStorage.setItem('dc_level', '1');
                }
                setCurrentScreen('seasons'); 
            };

            const handleLogout = () => { showConfirm("XÓA DỮ LIỆU?", "Toàn bộ Xu và Cấp độ sẽ bị bốc hơi vĩnh viễn. Bạn có chắc chắn muốn xóa hồ sơ hiện tại?", () => { localStorage.clear(); setNickname(''); setInputName(''); setCoins(1500); setCurrentLevelId(1); setCurrentScreen('home'); }); };

            const startSeason1 = () => {
                const lvl = OFFLINE_DB.find(l => l.id === currentLevelId) || OFFLINE_DB[0];
                initLevel(lvl);
                setCurrentScreen('play');
            };

            const initLevel = (lvlObj) => {
                setLevelData(lvlObj);
                
                const slots = [];
                for (let i = 0; i < lvlObj.answer.length; i++) {
                    if (lvlObj.answer[i] === ' ') {
                        slots.push({ type: 'space', char: ' ' });
                    } else {
                        slots.push({ type: 'slot', char: null, letterObj: null });
                    }
                }
                
                setAnswerSlots(slots);
                setAvailableLetters(generateKeyboard(lvlObj.answer));     
                setIsVictory(false); setIsWrong(false); setHintStage(0); 
            };

            const handleLetterClick = (letterObj) => {
                if (letterObj.isUsed || isVictory) return;
                playSound('click'); setIsWrong(false);
                
                const firstEmptyIndex = answerSlots.findIndex(s => s.type === 'slot' && s.char === null);
                
                if (firstEmptyIndex !== -1) {
                    const newSlots = [...answerSlots];
                    newSlots[firstEmptyIndex] = { ...newSlots[firstEmptyIndex], char: letterObj.char, letterObj: letterObj };
                    setAnswerSlots(newSlots);
                    
                    setAvailableLetters(availableLetters.map(l => l.id === letterObj.id ? { ...l, isUsed: true } : l));
                }
            };

            const handleSlotClick = (index) => {
                const slot = answerSlots[index];
                if (slot.type === 'slot' && slot.char !== null && !isVictory) {
                    playSound('click'); setIsWrong(false);
                    const letterObj = slot.letterObj;
                    
                    const newSlots = [...answerSlots];
                    newSlots[index] = { ...newSlots[index], char: null, letterObj: null };
                    setAnswerSlots(newSlots);
                    
                    setAvailableLetters(availableLetters.map(l => l.id === letterObj.id ? { ...l, isUsed: false } : l));
                }
            };

            const handleHintClick = () => {
                if (hintStage === 0) {
                    if(coins < 100) { showAlert("THIẾU XU", "Bạn không đủ tiền để mở câu hỏi. Hãy tự suy nghĩ nhé!", "error"); return; }
                    showConfirm("MỞ CÂU HỎI", "Trừ 100 Xu để hiển thị câu hỏi chi tiết?", () => { playSound('coin'); setCoins(c => c - 100); setHintStage(1); saveProgress(coins - 100, currentLevelId); });
                } else if (hintStage === 1) {
                    if(coins < 150) { showAlert("THIẾU XU", "Ví của bạn đã cạn. Không đủ xu mua Phao cứu sinh!", "error"); return; }
                    showConfirm("MUA PHAO CỨU SINH", "Trừ 150 Xu để nhận gợi ý cực mạnh từ chuyên gia?", () => { playSound('coin'); setCoins(c => c - 150); setHintStage(2); saveProgress(coins - 150, currentLevelId); });
                }
            };

            const saveProgress = (newCoins, newLevelId) => { localStorage.setItem('dc_coins', newCoins); localStorage.setItem('dc_level', newLevelId); };

            useEffect(() => {
                // KIỂM TRA ĐÁP ÁN: ĐÃ FIX LỖI TẠI ĐÂY (LOẠI BỎ KHOẢNG TRẮNG CỦA ĐÁP ÁN GỐC KHI SO SÁNH)
                const isFull = answerSlots.filter(s => s.type === 'slot').every(s => s.char !== null);
                if (isFull && answerSlots.filter(s => s.type === 'slot').length > 0) {
                    const currentAnswer = answerSlots.filter(s => s.type === 'slot').map(s => s.char).join('');
                    const targetAnswer = levelData.answer.replace(/\s/g, ''); // Bỏ khoảng trắng trong DB để so sánh
                    
                    if (currentAnswer === targetAnswer) {
                        if (levelData.id === 100) { playSound('seasonWin'); } else { playSound('win'); }
                        setTimeout(() => setIsVictory(true), 300);
                        const newCoins = coins + 300; 
                        setCoins(newCoins);
                        saveProgress(newCoins, currentLevelId + 1);
                    } else {
                        playSound('wrong');
                        setIsWrong(true);
                    }
                }
            }, [answerSlots]);

            const handleNextLevel = () => {
                const nextLevel = OFFLINE_DB.find(l => l.id === currentLevelId + 1);
                if (nextLevel) { setCurrentLevelId(nextLevel.id); initLevel(nextLevel); } 
                else { setCurrentLevelId(currentLevelId + 1); setCurrentScreen('seasons'); }
            };

            // --- THUẬT TOÁN FLEXBOX CO GIÃN ĐỘNG CHO Ô CHỮ (DYNAMIC WRAP) ---
            // Thay vì cố định kích thước, ta cấp tỷ lệ phần trăm (%) để các ô tự động chia đều chiều ngang
            // Tự động ngắt dòng thông minh khi số lượng từ quá dài
            const renderAnswerSlots = () => {
                if (!levelData) return null;
                const words = levelData.answer.split(' '); // Tách thành các từ riêng biệt

                return words.map((wordStr, wordIdx) => {
                    // Xác định vị trí (index) thực sự trong mảng phẳng answerSlots
                    let startIndex = 0;
                    for(let i = 0; i < wordIdx; i++) startIndex += words[i].length + 1;
                    
                    return (
                        <div key={`wordbox-${wordIdx}`} className="flex justify-center gap-1 my-1">
                            {wordStr.split('').map((char, charIdx) => {
                                const slotIndex = startIndex + charIdx;
                                const slotData = answerSlots[slotIndex];
                                if (!slotData) return null; 
                                
                                // Logic tính kích thước ô: 
                                // Nếu câu ngắn (tổng chữ < 8) => Cho ô to (w-12 h-14)
                                // Nếu câu dài => Ô nhỏ lại một chút (w-9 h-11) để không bị chật
                                const totalLength = levelData.answer.replace(/\s/g, '').length;
                                const sizeClass = totalLength < 8 ? "w-12 h-14 sm:w-14 sm:h-16 text-2xl sm:text-3xl" : "w-[38px] h-12 sm:w-11 sm:h-14 text-xl sm:text-2xl";

                                return (
                                    <button 
                                        key={`slot-${slotIndex}`} onClick={() => handleSlotClick(slotIndex)}
                                        className={`slot-base ${sizeClass} ${slotData.char ? 'slot-filled' : 'slot-waiting'}`} 
                                    >
                                        {slotData.char ? slotData.char : ''}
                                    </button>
                                )
                            })}
                        </div>
                    )
                });
            };

            if (currentScreen === 'home') {
                return (
                    <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between p-6 relative">
                        <CustomAlert isOpen={alertState.isOpen} title={alertState.title} message={alertState.message} type={alertState.type} onConfirm={alertState.onConfirm} onCancel={closeAlert} showCancel={alertState.showCancel} />
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-amber-500 rounded-full blur-[120px] opacity-20 pointer-events-none"></div>
                        
                        {/* FIX SẢNH CHÍNH TỤT MOOD: Cho chữ "ĐẲNG CẤP" và "BẮT CHỮ 3D" nằm ngang hàng hoặc cân đối hơn */}
                        <div className="mt-16 z-10 flex flex-col items-center">
                            <div className="w-32 h-32 mb-6 relative shine-effect rounded-[32px] p-[2px] bg-gradient-to-br from-[#d4af37] via-[#fffacd] to-[#daa520] shadow-[0_0_40px_rgba(218,165,32,0.4)]">
                                <div className="w-full h-full bg-[#09090b] rounded-[30px] flex items-center justify-center overflow-hidden">
                                    <img src="./images/logo.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src="./images/level1.jpg"; }} />
                                </div>
                            </div>
                            <div className="text-center flex flex-col items-center">
                                <h1 className="text-4xl font-black text-gold tracking-[0.2em] uppercase mb-1">Đẳng Cấp</h1>
                                <h2 className="text-3xl font-black text-white tracking-widest" style={{ fontFamily: "'Playfair Display', serif" }}>
                                    BẮT CHỮ <span className="text-2xl text-gold font-sans italic">3D</span>
                                </h2>
                            </div>
                            <div className="h-px w-32 bg-gradient-to-r from-transparent via-amber-500 to-transparent mt-5 opacity-50"></div>
                        </div>

                        <div className="glass-panel p-8 rounded-[32px] w-full z-10 mt-8 shadow-2xl">
                            {nickname ? (
                                <div className="text-center">
                                    <p className="text-zinc-400 text-sm font-medium mb-1">Mừng Cao Thủ Trở Lại</p>
                                    <h3 className="text-3xl font-black text-gold mb-8 uppercase tracking-wider">{nickname}</h3>
                                    <button onClick={handleLogin} className="w-full py-4 bg-gold rounded-2xl font-black text-black text-lg shine-effect active:scale-95 transition-all mb-4">VÀO SẢNH CHÍNH</button>
                                    <button onClick={handleLogout} className="text-zinc-500 text-sm underline mt-2 py-2">Đăng xuất & Đổi tên khác</button>
                                </div>
                            ) : (
                                <div className="flex flex-col">
                                    <p className="text-center text-zinc-400 text-sm mb-6 leading-relaxed">Đăng ký danh tính để đua Top Đẳng Cấp.</p>
                                    <div className="relative mb-6">
                                        <input type="text" value={inputName} onChange={(e) => setInputName(e.target.value)} placeholder="Nhập Biệt danh..." className="w-full bg-zinc-900/80 border border-zinc-700 focus:border-amber-500 text-white rounded-2xl p-4 pl-12 font-bold text-lg outline-none uppercase placeholder:font-normal placeholder:text-zinc-600 placeholder:normal-case" maxLength="15" />
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-xl">👤</span>
                                    </div>
                                    <button onClick={handleLogin} className="w-full py-4 bg-gold rounded-2xl font-black text-black text-lg shine-effect active:scale-95 transition-all">BẮT ĐẦU</button>
                                </div>
                            )}
                        </div>

                        <div className="z-10 mt-8 mb-2 w-full text-center">
                            <div className="flex flex-col items-center justify-center space-y-1 bg-zinc-900/40 py-3 px-6 rounded-full border border-zinc-800/50 backdrop-blur-sm mx-auto w-max">
                                <p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">© 2026 Bản quyền <span className="text-gold ml-1 text-[12px]">MinhTT</span></p>
                                <div className="flex items-center space-x-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                                    <p className="text-xs font-bold text-zinc-300 tracking-wider">Hotline: <span className="text-white">0987.334.004</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'seasons') {
                return (
                    <div className="max-w-md mx-auto min-h-screen bg-zinc-950 p-6 pt-12 relative flex flex-col">
                        <CustomAlert isOpen={alertState.isOpen} title={alertState.title} message={alertState.message} type={alertState.type} onConfirm={alertState.onConfirm} onCancel={closeAlert} showCancel={alertState.showCancel} />
                        <div className="flex justify-between items-center mb-10 z-10">
                            <h2 className="text-white text-2xl font-black tracking-widest">SẢNH CHÍNH</h2>
                            <div className="flex items-center bg-zinc-800 px-4 py-2 rounded-full border border-amber-500/40 shadow-gold">
                                <span className="text-amber-400 font-bold mr-2">{coins}</span><span className="text-amber-500">🪙</span>
                            </div>
                        </div>

                        <div className="flex flex-col gap-6 z-10">
                            <div className="glass-panel p-6 rounded-3xl relative overflow-hidden border border-amber-500/50">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500 opacity-10 rounded-full blur-[40px]"></div>
                                <h3 className="text-gold text-2xl font-black mb-2">MÙA 1: KHỞI NGUYÊN</h3>
                                <p className="text-zinc-400 text-sm mb-6">100 Cấp độ cơ bản định hình tư duy.</p>
                                <div className="bg-zinc-900 rounded-full h-3 w-full mb-2 overflow-hidden">
                                    <div className="bg-gradient-to-r from-amber-600 to-amber-400 h-full transition-all duration-1000" style={{width: `${Math.min(currentLevelId, 100)}%`}}></div>
                                </div>
                                <div className="flex justify-between text-xs text-zinc-500 font-bold tracking-widest mb-6">
                                    <span>TIẾN ĐỘ</span><span>{Math.min(currentLevelId, 100)}/100</span>
                                </div>
                                {currentLevelId > 100 ? (
                                    <button disabled className="w-full py-4 bg-zinc-800 rounded-xl font-black text-amber-500 border border-amber-500/30">ĐÃ HOÀN THÀNH</button>
                                ) : (
                                    <button onClick={startSeason1} className="w-full py-4 bg-gold rounded-xl font-black text-black active:scale-95 transition-all">CHƠI NGAY</button>
                                )}
                            </div>

                            <div className={`p-6 rounded-3xl relative overflow-hidden border ${currentLevelId > 100 ? 'glass-panel border-amber-500/50' : 'bg-zinc-900/50 border-zinc-800'}`}>
                                <h3 className={`text-2xl font-black mb-2 ${currentLevelId > 100 ? 'text-gold' : 'text-zinc-600'}`}>MÙA 2: ĐỈNH CAO</h3>
                                <p className="text-zinc-500 text-sm mb-6">Gói cấp độ thử thách tư duy phản biện.</p>
                                {currentLevelId > 100 ? (
                                    <button onClick={() => showAlert("CHƯA MỞ", "Mùa 2 đang trong quá trình phát triển. Vui lòng quay lại sau!", "warning")} className="w-full py-4 bg-zinc-800 rounded-xl font-black text-white active:scale-95 border border-zinc-700">ĐANG CẬP NHẬT...</button>
                                ) : (
                                    <div className="flex items-center justify-center py-4 bg-zinc-950 rounded-xl text-zinc-600 font-black tracking-widest">
                                        <span className="mr-2">🔒</span> CẦN PHÁ ĐẢO MÙA 1
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-zinc-950 relative flex flex-col">
                    <CustomAlert isOpen={alertState.isOpen} title={alertState.title} message={alertState.message} type={alertState.type} onConfirm={alertState.onConfirm} onCancel={closeAlert} showCancel={alertState.showCancel} />
                    
                    {/* THU GỌN HEADER LEVEL & SỐ TIỀN NHƯ YÊU CẦU */}
                    <div className="flex justify-between items-center p-4 pt-6 z-10 glass-panel border-b-0 rounded-b-3xl absolute top-0 left-0 right-0 max-w-md mx-auto w-full shadow-lg">
                        <button onClick={() => setCurrentScreen('seasons')} className="p-2.5 bg-zinc-800 rounded-xl text-zinc-400 font-bold active:scale-90 transition-transform border border-zinc-700">❮</button>
                        
                        <div className="text-center flex flex-col items-center flex-1">
                            <span className="text-white text-xl font-black tracking-wider uppercase drop-shadow-md">LEVEL <span className="text-amber-500">{currentLevelId}</span></span>
                        </div>

                        <div className="flex items-center bg-zinc-800 px-3 py-1.5 rounded-full border border-amber-500/40 shadow-gold">
                            <span className="text-amber-400 font-bold mr-1.5 text-sm">{coins}</span><span className="text-amber-500 text-lg">🪙</span>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col items-center px-4 pt-[90px] pb-[220px] overflow-y-auto w-full">
                        
                        <div 
                            onClick={handleHintClick}
                            className={`w-full text-center p-2 rounded-2xl mb-4 border transition-all cursor-pointer shadow-lg flex flex-col justify-center items-center min-h-[50px] flex-shrink-0
                                ${hintStage === 0 ? 'bg-zinc-800/80 border-zinc-700 active:scale-95' : 'bg-black/40 border-amber-500/50'}`}
                        >
                            {hintStage === 0 && (
                                <div className="flex items-center justify-center gap-2 w-full">
                                    <span className="text-amber-500 text-sm font-bold tracking-[0.2em] uppercase whitespace-nowrap overflow-hidden text-ellipsis max-w-[60%]"># {levelData.topic}</span>
                                    <span className="text-[10px] md:text-xs bg-zinc-700 text-zinc-300 px-2 py-1 rounded-full whitespace-nowrap">❓ Mở Câu Hỏi</span>
                                </div>
                            )}
                            
                            {hintStage === 1 && (
                                <div className="w-full flex flex-col items-center animate-[fadeIn_0.5s_ease-out]">
                                    <p className="text-white text-[14px] md:text-[15px] font-semibold leading-relaxed mb-1 px-1">{levelData.question}</p>
                                    <span className="text-[10px] bg-amber-500/20 border border-amber-500/30 text-amber-500 px-3 py-0.5 rounded-full uppercase tracking-widest animate-pulse w-max mx-auto mt-1">💡 Mua phao cứu sinh</span>
                                </div>
                            )}

                            {hintStage === 2 && (
                                <div className="w-full flex flex-col items-center animate-[fadeIn_0.5s_ease-out]">
                                    <p className="text-white text-[13px] md:text-[14px] font-semibold leading-relaxed mb-1 text-zinc-400 px-1">{levelData.question}</p>
                                    <p className="text-amber-500 text-[14px] md:text-[15px] font-black uppercase tracking-wider px-1 mt-1">💡 PHAO: {levelData.hint}</p>
                                </div>
                            )}
                        </div>

                        <div className="w-[80%] max-w-[320px] aspect-square rounded-[32px] overflow-hidden border-2 border-amber-600/50 mb-6 bg-black relative shadow-[0_0_30px_rgba(218,165,32,0.15)] flex-shrink-0">
                            <img src={`./images/level${levelData.id}.jpg`} className="w-full h-full object-cover" alt="Quiz" />
                        </div>

                        {/* HIỂN THỊ KHAY ĐÁP ÁN: SỬ DỤNG FLEXBOX FLEX-WRAP ĐỂ TỰ ĐỘNG XUỐNG DÒNG RẤT MƯỢT */}
                        <div className={`w-full flex justify-center mt-auto mb-2 ${isWrong ? 'animate-shake' : ''} flex-shrink-0`}>
                            <div className="flex flex-wrap justify-center gap-x-3 gap-y-3 px-1 w-full max-w-[100%]">
                                {renderAnswerSlots()}
                            </div>
                        </div>
                    </div>

                    {/* BÀN PHÍM */}
                    <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md glass-panel p-4 pb-8 rounded-t-[40px] border-t border-zinc-800 z-[50] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                        <div className="flex flex-wrap justify-center gap-1.5 md:gap-2 px-1">
                            {availableLetters.map((item) => (
                                <button 
                                    key={item.id} onClick={() => handleLetterClick(item)} disabled={item.isUsed}
                                    className={`w-[calc(100%/7-0.4rem)] md:w-[calc(100%/7-0.75rem)] aspect-square max-h-[56px] rounded-[14px] flex justify-center items-center font-black text-[20px] md:text-[22px] transition-all duration-150 
                                        ${item.isUsed ? 'bg-zinc-950 opacity-10 border-0 text-transparent' : 'bg-zinc-800 border-b-[4px] border-black text-white active:translate-y-1 active:border-b-0 shadow-lg hover:bg-zinc-700'}`}
                                >
                                    {item.char}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* MODAL CHIẾN THẮNG */}
                    {isVictory && (
                        <div className="absolute inset-0 bg-black/95 flex justify-center items-center p-6 z-[9999] animate-[fadeIn_0.3s_ease-out]">
                            <div className="bg-zinc-900 p-8 rounded-[40px] flex flex-col items-center border-2 border-gold w-full max-w-sm shadow-[0_0_50px_rgba(191,149,63,0.2)] relative overflow-hidden">
                                <div className="absolute top-[-50px] w-full h-32 bg-gold opacity-20 blur-[50px]"></div>
                                
                                {levelData.id === 100 ? (
                                    <>
                                        <h3 className="text-amber-500 font-black tracking-widest text-lg mb-2 text-center animate-bounce drop-shadow-xl">🏆 CHÚC MỪNG PHÁ ĐẢO! 🏆</h3>
                                        <p className="text-zinc-400 text-sm text-center mb-6">Đẳng cấp của bạn đã được khẳng định (+300 🪙)</p>
                                    </>
                                ) : (
                                    <h3 className="text-zinc-400 font-bold tracking-widest text-sm mb-2">ĐÁP ÁN CHUẨN (+300 🪙)</h3>
                                )}

                                <h2 className="text-gold text-5xl font-black mb-10 tracking-widest text-center">{levelData.answer}</h2>
                                <button onClick={handleNextLevel} className="bg-gold w-full py-5 rounded-full font-black text-black text-xl tracking-widest shadow-gold active:scale-95 transition-transform">
                                    {levelData.id === 100 ? 'VỀ SẢNH CHÍNH ➔' : 'TIẾP THEO ➔'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
